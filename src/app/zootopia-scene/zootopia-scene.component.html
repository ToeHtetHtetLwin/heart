<div class="relative w-full h-screen overflow-hidden bg-[#0d010d]">
  
  <div #rendererContainer class="absolute inset-0 z-0 pointer-events-none"></div>

  <div class="relative z-10 w-full h-full flex flex-col items-center justify-center p-4">
    
    <div class="flex flex-col items-center w-full max-w-lg">
      
      <div class="relative w-52 h-52 sm:w-64 sm:h-64 md:w-80 md:h-80 rounded-3xl overflow-hidden border-2 border-pink-500/50 shadow-[0_0_80px_rgba(255,20,147,0.5),0_0_30px_rgba(255,0,0,0.3)] bg-black/40 backdrop-blur-sm">
        <img [src]="currentSlide().gif" 
             class="w-full h-full object-cover opacity-95 animate-fade-in" 
             alt="Zootopia Love"/>
      </div>

      <div class="mt-10 text-center pointer-events-auto z-30 px-6">
        <h2 class="text-white text-4xl sm:text-5xl md:text-6xl font-bold italic drop-shadow-[0_0_15px_rgba(255,20,147,0.8)]" 
            style="font-family: 'Dancing Script', cursive;">
          "{{ currentSlide().text }}"
        </h2>

        <button (click)="nextSlide()" 
                class="mt-12 group px-10 md:px-14 py-3 rounded-full border-2 border-pink-400 bg-pink-950/20 text-white hover:bg-gradient-to-r hover:from-pink-600 hover:to-red-600 hover:border-white transition-all duration-500 shadow-xl active:scale-95">
          <span class="tracking-[0.4em] font-bold text-[11px] md:text-xs uppercase">Our Story</span>
        </button>
      </div>

    </div>

  </div>
  
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(80,0,40,0.3)_0%,#0d010d_100%)] pointer-events-none z-1"></div>
</div>
